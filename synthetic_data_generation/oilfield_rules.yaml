# oilfield_rules.yaml — QC rules for an oil and gas well pad
# Used with: tsqc.check(df, rules="data/oilfield_rules.yaml")
#
# Tags:
#   WHP.PSIG        — Wellhead Pressure (psig), normal 400-900, MAWP 1100
#   FMRATE.MSCFD    — Gas flow rate at the meter (Mscfd), normal 1500-4500
#   OHT.TEMP_F      — Heater-treater outlet temperature (°F), normal 100-180
#
# NOTE (v0.1 limitation): tag_rules ADD TO default_rules; they do not replace them.
# The default flatline rule is excluded here and defined per-tag so each sensor
# gets the correct min_delta threshold for its physical characteristics.

default_rules:
  # Missing data is always bad — any sensor should report NaN as bad
  - check: null
    level: bad

# Tag-specific rules
tag_rules:

  WHP.PSIG:
    # Wellhead pressure must be > atmospheric (~14.7 psig) and < MAWP
    - check: range
      min: 50.0
      max: 1100.0
      level: bad
    # Step change > 100 psig/hour is a sensor fault (not normal pump cycling)
    - check: delta
      max_delta: 100.0
      level: sus
    # Pressure flatline during normal operation is suspicious.
    # min_delta=0.5 avoids flagging transiently-stable periods of normal flow.
    # A perfectly flat 4 h window is flagged.
    - check: flatline
      window: 4h
      min_delta: 0.5
      level: sus

  FMRATE.MSCFD:
    # Flow rate physical limits
    - check: range
      min: 0.0
      max: 5500.0
      level: bad
    # Step change > 800 Mscfd/hour is a fault (not normal demand variation)
    - check: delta
      max_delta: 800.0
      level: sus
    # Comm-freeze or stuck meter — 4 h window
    # min_delta=5.0 allows natural low-volatility flow periods
    - check: flatline
      window: 4h
      min_delta: 5.0
      level: sus

  OHT.TEMP_F:
    # Heater-treater outlet temperature: 100-180 °F operating range
    - check: range
      min: 50.0
      max: 200.0
      level: bad
    # Step change > 15 °F/hour is a sensor fault or emergency shutdown
    - check: delta
      max_delta: 15.0
      level: sus
    # Heater stuck / temp sensor flatline for >6 h
    # min_delta=0.5 prevents false flags during tight steady-state control
    - check: flatline
      window: 6h
      min_delta: 0.5
      level: sus
