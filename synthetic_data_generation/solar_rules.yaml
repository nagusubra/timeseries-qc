# solar_rules.yaml — QC rules for a single-axis tracking solar farm
# Used with: tsqc.check(df, rules="data/solar_rules.yaml")
#
# Tags:
#   INVERTER.MW     — AC output of the inverter array (MW), 10 MW nameplate
#   MET.IRRADIANCE  — Pyranometer GHI reading (W/m²)
#   TRACKER.ANGLE   — Single-axis tracker tilt angle (degrees, ±90° range)
#
# NOTE (v0.1 limitation): tag_rules ADD TO default_rules; they do not replace them.
# The default flatline rule is excluded here and defined per-tag so each sensor
# gets the correct min_delta threshold for its physical characteristics.

default_rules:
  # Missing data is always bad — any sensor should report NaN as bad
  - check: null
    level: bad

# Tag-specific rules
tag_rules:

  INVERTER.MW:
    # Physical limits: inverter cannot produce negative MW or exceed 110% nameplate
    - check: range
      min: 0.0
      max: 11.0
      level: bad
    # Step change > 5 MW/hour on a 10 MW plant is a fault (not normal ramp)
    - check: delta
      threshold: 5.0
      level: sus
    # Inverter flatline during daylight is suspicious.
    # min_delta=0.05 avoids flagging true nighttime zeros (all equal to ~0).
    # A non-zero reading that stays perfectly flat for >3h is flagged.
    - check: flatline
      window: 3h
      min_delta: 0.05
      level: sus

  MET.IRRADIANCE:
    # GHI cannot be negative; theoretical max clear-sky ~1050 W/m²
    - check: range
      min: 0.0
      max: 1050.0
      level: bad
    # Step change > 400 W/m²/hour is physically implausible (not a passing cloud edge)
    - check: delta
      threshold: 400.0
      level: sus
    # Pyranometer stuck (comm-freeze) during daylight — 2h window
    # min_delta=1.0 avoids flagging true nighttime flat zeros
    - check: flatline
      window: 2h
      min_delta: 1.0
      level: sus

  TRACKER.ANGLE:
    # Single-axis tracker: physical stops at ±90°; stow position is 0°
    - check: range
      min: -90.0
      max: 90.0
      level: bad
    # Angular step > 30°/hour is a fault (normal max slew ~15°/hour)
    - check: delta
      threshold: 30.0
      level: sus
    # Tracker stuck for >4h during daytime is suspicious (controller fault).
    # min_delta=1.0 avoids flagging legitimate nighttime park at 0°.
    - check: flatline
      window: 4h
      min_delta: 1.0
      level: sus
