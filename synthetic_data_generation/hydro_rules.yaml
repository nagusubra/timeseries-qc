# hydro_rules.yaml — QC rules for hydro power plant SCADA data
# Used with: tsqc.check(df, rules="data/hydro_rules.yaml")
#
# NOTE (v0.1 limitation): tag_rules ADD TO default_rules; they do not replace them.
# Therefore the default flatline rule is excluded from default_rules here and
# defined per-tag individually so each tag gets the correct min_delta threshold.

# Rules applied to every tag by default
default_rules:
  - check: null
    level: bad

  - check: delta
    max_delta: 100.0
    level: sus

# Tag-specific rules that add to (not replace) the default rules above
tag_rules:

  FOREBAY.LEVEL:
    # Forebay moves slowly — flatline >1h with min variation is suspicious
    - check: flatline
      window: 1h
      min_delta: 0.01
      level: sus
    # Physical plausibility: forebay cannot be below dead pool or above spillway
    - check: range
      min: 900.0
      max: 1100.0
      level: bad
    # Forebay jump > 5 ft/min is a sensor fault
    - check: delta
      max_delta: 5.0
      level: sus

  TAILRACE.LEVEL:
    - check: flatline
      window: 1h
      min_delta: 0.01
      level: sus
    - check: range
      min: 800.0
      max: 900.0
      level: bad
    - check: delta
      max_delta: 10.0
      level: sus

  GENERATOR.MW:
    # Valid range: 0 (offline) to nameplate 150 MW
    - check: range
      min: 0.0
      max: 155.0
      level: bad
    # min_delta=0.5: 0 MW flatline (unit offline) is NOT flagged.
    # A flatline at any non-zero value for >30 min IS suspicious.
    - check: flatline
      window: 30min
      min_delta: 0.5
      level: sus

  INFLOW.CFS:
    - check: flatline
      window: 1h
      min_delta: 1.0
      level: sus
    # Inflow physically bounded by watershed hydrology
    - check: range
      min: 0.0
      max: 15000.0
      level: bad
    # Inflow spikes > 5000 CFS/min are instrument artefacts (not real hydrology)
    - check: delta
      max_delta: 5000.0
      level: sus
